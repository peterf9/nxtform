<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextStream | Partner Alliance Portal</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #f4f7f6;
            --text: #333;
            --white: #ffffff;
            --accent: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        header img {
            width: 250px;
            margin-bottom: 15px;
        }

        h1 { color: var(--primary); margin: 0; font-size: 24px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin-top: 30px; color: var(--primary); font-size: 20px; }
        h4 { margin: 10px 0 5px 0; color: var(--primary); }

        .form-section { border: none; padding: 0; margin-bottom: 25px; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .field-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }

        .sites-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .country-group label {
            display: flex;
            align-items: center;
            font-weight: normal;
            margin: 4px 0;
            cursor: pointer;
        }

        input[type="checkbox"] { margin-right: 8px; width: 18px; height: 18px; cursor: pointer; }

        .restriction-box {
            background: #fff3e0;
            border-left: 5px solid var(--accent);
            padding: 10px;
            margin: 10px 0;
            font-size: 13px;
            font-weight: bold;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #004494; }
        
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }

        #summaryOutput {
            margin-top: 30px;
            padding: 20px;
            background: #f0f4f8;
            border-radius: 8px;
            display: none;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
            border: 1px dashed #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://nextstream.com/wp-content/uploads/2025/06/Nextstream-azul.svg" alt="NextStream">
        <h1>PARTNER ALLIANCE PORTAL</h1>
        <p>Formulário de Qualificação Estratégica (HubSpot Ready)</p>
    </header>

    <form id="qualifForm">
        <h2>1. Perfil da Oportunidade</h2>
        <div class="grid-3">
            <div class="field-group">
                <label>Parceiro / Solicitante</label>
                <input type="text" id="partner" placeholder="Nome da sua empresa">
            </div>
            <div class="field-group">
                <label>Cliente Final (Indústria)</label>
                <input type="text" id="client" placeholder="Ex: Setor Bancário">
            </div>
            <div class="field-group">
                <label>Data da Solicitação</label>
                <input type="date" id="reqDate">
            </div>
        </div>

        <label style="display: block; margin-top: 20px;">Localidade de Interesse (Sites)</label>
        <div class="sites-container">
            <div class="country-group">
                <h4>🇧🇷 BRASIL</h4>
                <label><input type="checkbox" name="site" value="GRUTB01"> Tamboré (GRUTB01)</label>
                <label><input type="checkbox" name="site" value="CWBCT01"> Curitiba (CWBCT01)</label>
            </div>
            <div class="country-group">
                <h4>🇲🇽 MÉXICO</h4>
                <label><input type="checkbox" name="site" value="MEXIX01"> Ixtlahuaca (MEXIX01)</label>
            </div>
            <div class="country-group">
                <h4>🇦🇷 ARGENTINA</h4>
                <label><input type="checkbox" name="site" value="EZEBA01"> Barracas (EZEBA01)</label>
                <label><input type="checkbox" name="site" value="EZEVE01"> Velez (EZEVE01)</label>
            </div>
            <div class="country-group">
                <h4>🇵🇪 PERU</h4>
                <label><input type="checkbox" name="site" value="LIMLI01"> Lince (LIMLI01)</label>
                <label><input type="checkbox" name="site" value="LIMMO01"> Monterico (LIMMO01)</label>
            </div>
            <div class="country-group">
                <h4>🇨🇱 CHILE</h4>
                <label><input type="checkbox" name="site" value="SCLPA01"> Paine 1 (SCLPA01)</label>
                <label><input type="checkbox" name="site" value="SCLPA02"> Paine 2 (SCLPA02)</label>
                <label><input type="checkbox" name="site" value="SCLAP01"> Apoquindo (SCLAP01)</label>
                <label><input type="checkbox" name="site" value="SCLSM01"> San Martin (SCLSM01)</label>
            </div>
        </div>

        <h2>2. Infraestrutura (Missão Crítica)</h2>
        <div class="restriction-box">
            ⚠️ RESTRIÇÃO MÉXICO: Rack Mín de 45U | Densidade Mín: 2 kVA | Máx: 6 kVA.
        </div>
        <div class="grid-3">
            <div class="field-group">
                <label>Qtd. Racks</label>
                <input type="number" id="racks" min="1">
            </div>
            <div class="field-group">
                <label>Densidade (kVA p/ Rack)</label>
                <input type="number" id="kva" step="0.1">
            </div>
            <div class="field-group">
                <label>Modelo Setup</label>
                <select id="setupModel">
                    <option value="CAPEX">Upfront (CAPEX)</option>
                    <option value="OPEX">Diluído (OPEX)</option>
                </select>
            </div>
        </div>

        <h2>3. Portfólio de Serviços</h2>
        <div class="grid-3">
            <div class="field-group">
                <label>Conectividade</label>
                <label><input type="checkbox" name="svc" value="Cross Connect"> Cross Connect</label>
                <label><input type="checkbox" name="svc" value="Cloud Connect"> Cloud Connect</label>
                <label><input type="checkbox" name="svc" value="IX Peering"> IX / Peering</label>
            </div>
            <div class="field-group">
                <label>Suporte & Segurança</label>
                <label><input type="checkbox" name="svc" value="Smart Hands"> Smart Hands 24x7</label>
                <label><input type="checkbox" name="svc" value="Anti-DDoS"> Proteção Anti-DDoS</label>
                <label><input type="checkbox" name="svc" value="CCTV Custom"> Monitoramento Custom</label>
            </div>
            <div class="field-group">
                <label>Prazo Contratual</label>
                <select id="term">
                    <option value="24 meses">24 meses (5% disc)</option>
                    <option value="36 meses">36 meses (7% disc)</option>
                    <option value="60 meses">60 meses (10% disc)</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-primary" onclick="generateQualif()">Gerar Qualificação Completa</button>
            <button type="button" class="btn-outline" onclick="copyToClipboard()">Copiar Texto</button>
            <button type="button" class="btn-outline" onclick="sendEmail()">📧 Enviar para PFischer</button>
        </div>
    </form>

    <div id="summaryOutput"></div>
</div>

<script>
    function generateQualif() {
        const partner = document.getElementById('partner').value || 'N/A';
        const client = document.getElementById('client').value || 'N/A';
        const racks = document.getElementById('racks').value || '0';
        const kva = document.getElementById('kva').value || '0';
        const setup = document.getElementById('setupModel').value;
        const term = document.getElementById('term').value;

        let selectedSites = [];
        document.querySelectorAll('input[name="site"]:checked').forEach(cb => selectedSites.push(cb.value));

        let selectedSvcs = [];
        document.querySelectorAll('input[name="svc"]:checked').forEach(cb => selectedSvcs.push(cb.value));

        const summary = `--- QUALIFICAÇÃO NEXTSTREAM ---\n` +
                        `Parceiro: ${partner}\n` +
                        `Cliente: ${client}\n` +
                        `Sites Selecionados: ${selectedSites.join(', ') || 'Nenhum'}\n` +
                        `Infra: ${racks} Racks @ ${kva}kVA/Rack (${setup})\n` +
                        `Serviços: ${selectedSvcs.join(', ')}\n` +
                        `Termo: ${term}\n` +
                        `-------------------------------`;

        const output = document.getElementById('summaryOutput');
        output.innerText = summary;
        output.style.display = 'block';
        return summary;
    }

    function copyToClipboard() {
        const text = generateQualif();
        navigator.clipboard.writeText(text);
        alert('Texto copiado para a área de transferência!');
    }

    function sendEmail() {
        const text = encodeURIComponent(generateQualif());
        window.location.href = `mailto:pfischer@nextstream.com?subject=Nova Qualificação Portal&body=${text}`;
    }
</script>

</body>
</html>
